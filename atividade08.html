<!DOCTYPE html>
<html>
<body>


<h2>Cadastro</h2>


<form onsubmit="validar(event)">
  Nome:<br>
  <input type="text" id="nome">
  <div id="erroNome" style="color:red"></div>


  <br>Email:<br>
  <input type="text" id="email">
  <div id="erroEmail" style="color:red"></div>


  <br><br>
  <button type="submit">Cadastrar</button>
</form>


<script>
function validar(e) {
  e.preventDefault();


  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;


  let erro = false;


  if (nome === "") {
    document.getElementById("erroNome").textContent = "Nome obrigatório";
    erro = true;
  } else {
    document.getElementById("erroNome").textContent = "";
  }


  if (!email.includes("@")) {
    document.getElementById("erroEmail").textContent = "Email inválido";
    erro = true;
  } else {
    document.getElementById("erroEmail").textContent = "";
  }


  if (!erro) {
    alert("Cadastro realizado!");
  }
}
</script>


</body>
</html>
