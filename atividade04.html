<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Automatico</title>
</head>
<body>
    <h2>Notas</h2>


<input type="number" id="nota1">
<input type="number" id="nota2">


<button onclick="verificar()">Calcular Média</button>


<p id="resultado"></p>


<script>
function verificar() {
    let n1 = Number(nota1.value);
    let n2 = Number(nota2.value);
    let media = (n1 + n2) / 2;


    let res = document.getElementById("resultado");


    if (media >= 7) {
        res.innerText = "Aprovado";
        res.style.color = "green";
    } else if (media >= 5) {
        res.innerText = "Recuperação";
        res.style.color = "orange";
    } else {
        res.innerText = "Reprovado";
        res.style.color = "red";
    }
}
</script>
</body>
</html>
